<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿嬤的廚房智慧 — 食安小偵探 (繪本版)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="app">
    <!-- 遊戲容器 -->
    <main id="game-container">
      
      <!-- 標題畫面 -->
      <section id="title-screen" class="screen active">
        <div class="content-box">
          <h1 class="main-title">阿嬤的廚房智慧</h1>
          <p class="subtitle">食安小偵探 — 繪本冒險</p>
          <div class="illustration-container main-bg">
            <!-- 這裡會放背景圖 -->
          </div>
          <button id="start-btn" class="btn-handdrawn">點我開始玩</button>
        </div>
      </section>

      <!-- 遊戲畫面 -->
      <section id="game-screen" class="screen">
        <div class="hud">
          <div class="progress-bar">
            <div id="progress-fill"></div>
          </div>
          <div id="score-display">阿嬤給的小貼紙: 0</div>
        </div>

        <div class="game-content">
          <div class="scenario-card">
            <div id="scenario-image" class="watercolor-frame">
              <!-- 動態載入食物圖片 -->
            </div>
            <div class="scenario-info">
              <h2 id="scenario-title">這還能吃嗎？</h2>
              <p id="scenario-desc">阿嬤在廚房發現了這個，請幫忙看看...</p>
            </div>
          </div>

          <div class="action-grid">
            <button class="choice-btn" data-choice="safe">
              <span class="icon">✅</span>
              <span>這還可以吃</span>
            </button>
            <button class="choice-btn" data-choice="unsafe">
              <span class="icon">⚠️</span>
              <span>這壞掉不能吃</span>
            </button>
          </div>
        </div>
      </section>

      <!-- 結算畫面 -->
      <section id="result-screen" class="screen">
        <div class="content-box result-box">
          <h2>偵查結束囉！</h2>
          <div id="final-score" class="final-score">0 / 5</div>
          <div id="wisdom-card" class="wisdom-card">
            <h3>阿嬤的悄悄話</h3>
            <p id="wisdom-text"></p>
          </div>
          <button id="restart-btn" class="btn-handdrawn">再玩一次</button>
        </div>
      </section>

    </main>

    <!-- 提示對話框 -->
    <div id="feedback-overlay" class="overlay hidden">
      <div class="feedback-content">
        <div id="feedback-icon"></div>
        <div id="feedback-message"></div>
        <button id="next-btn" class="btn-handdrawn">下一關</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * 阿嬤的廚房智慧 — 食安小偵探
     * 繪本風邏輯核心
     */

    const scenarios = [
      {
        id: 1,
        title: "這塊麵包還能吃嗎？",
        desc: "麵包放在桌上好幾天了，上面長了綠綠毛毛的東西...",
        image: "file:///C:/Users/Admin/.gemini/antigravity/brain/235b7f83-be3b-45ff-9164-45c113cbbed0/food_bread_moldy_watercolor_1778153287018.png",
        isSafe: false,
        wisdom: "看到黑點點或綠綠的毛，就代表裡面都壞了，不能只把發霉的地方切掉喔！",
        feedback: {
          correct: "沒錯！阿嬤說：『發霉的東西千萬不能吃，就算切掉也看不見深處的黴菌。』",
          wrong: "哎呀！雖然看起來只有一點點，但黴菌的根部已經長進去裡面了，很不安全喔。"
        }
      },
      {
        id: 2,
        title: "這個罐頭鼓鼓的？",
        desc: "櫃子裡的魚罐頭，蓋子好像有點凸起來了...",
        image: "file:///C:/Users/Admin/.gemini/antigravity/brain/235b7f83-be3b-45ff-9164-45c113cbbed0/food_can_bloated_watercolor_1778153483716.png",
        isSafe: false,
        wisdom: "罐頭鼓起來代表裡面已經壞掉產生毒素了，這可是會中毒的，千萬不能打開！",
        feedback: {
          correct: "真細心！阿嬤說：『罐頭鼓鼓的就代表裡面變質了，絕對不能要。』",
          wrong: "小心！罐頭鼓起來代表內部細菌正在長，是非常危險的信號。"
        }
      },
      {
        id: 3,
        title: "馬鈴薯長出小芽了？",
        desc: "這顆馬鈴薯長出了白白綠綠的小芽...",
        image: "file:///C:/Users/Admin/.gemini/antigravity/brain/235b7f83-be3b-45ff-9164-45c113cbbed0/food_potato_sprout_watercolor_1778153498126.png",
        isSafe: false,
        wisdom: "馬鈴薯發芽會有毒素，就算挖掉芽眼毒素還是存在，煮熟了也去不掉喔！",
        feedback: {
          correct: "對！阿嬤說：『馬鈴薯發芽就有毒，整顆都不能吃了，別省那幾塊錢。』",
          wrong: "不對喔！馬鈴薯發芽後毒性很強，跟地瓜不一樣，絕對不能吃。"
        }
      },
      {
        id: 4,
        title: "這盤雞肉變灰色了？",
        desc: "雞肉放了一個下午，顏色看起來灰灰的，摸起來還黏黏的...",
        image: "file:///C:/Users/Admin/.gemini/antigravity/brain/235b7f83-be3b-45ff-9164-45c113cbbed0/food_chicken_gray_watercolor_1778153510995.png",
        isSafe: false,
        wisdom: "雞肉變灰色且摸起來黏黏的，就是細菌已經長滿了，聞起來可能還酸酸的。",
        feedback: {
          correct: "觀察入微！阿嬤說：『肉類只要顏色不對、摸起來黏手，就是壞了。』",
          wrong: "不行喔！雖然煮熟可以殺菌，但細菌留下的毒素是煮不掉的。"
        }
      },
      {
        id: 5,
        title: "昨天的菜一直保溫？",
        desc: "昨晚沒吃完的菜，一直放在電鍋裡保溫到現在...",
        image: "file:///C:/Users/Admin/.gemini/antigravity/brain/235b7f83-be3b-45ff-9164-45c113cbbed0/food_leftovers_watercolor_1778153525761.png",
        isSafe: false,
        wisdom: "電鍋保溫的溫度不夠燙，反而是細菌最喜歡的溫度。剩菜要放冰箱，吃之前再熱透。",
        feedback: {
          correct: "聰明！阿嬤說：『電鍋不是冰箱，東西沒吃完要放冰箱，要吃再熱。』",
          wrong: "哎呀！電鍋保溫不夠熱，反而會讓細菌長得更快，這樣吃會拉肚子喔。"
        }
      }
    ];

    // 遊戲狀態
    let currentState = {
      currentScenarioIndex: 0,
      score: 0,
      gameStarted: false
    };

    // DOM 元素
    let screens, elements;

    // 初始化
    function init() {
      screens = {
        title: document.getElementById('title-screen'),
        game: document.getElementById('game-screen'),
        result: document.getElementById('result-screen')
      };

      elements = {
        startBtn: document.getElementById('start-btn'),
        restartBtn: document.getElementById('restart-btn'),
        nextBtn: document.getElementById('next-btn'),
        scenarioTitle: document.getElementById('scenario-title'),
        scenarioDesc: document.getElementById('scenario-desc'),
        scenarioImage: document.getElementById('scenario-image'),
        scoreDisplay: document.getElementById('score-display'),
        progressFill: document.getElementById('progress-fill'),
        feedbackOverlay: document.getElementById('feedback-overlay'),
        feedbackIcon: document.getElementById('feedback-icon'),
        feedbackMessage: document.getElementById('feedback-message'),
        finalScore: document.getElementById('final-score'),
        wisdomText: document.getElementById('wisdom-text')
      };

      elements.startBtn.addEventListener('click', startGame);
      elements.restartBtn.addEventListener('click', startGame);
      elements.nextBtn.addEventListener('click', nextScenario);
      
      document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const choice = e.currentTarget.dataset.choice === 'safe';
          handleChoice(choice);
        });
      });
    }

    // 開始遊戲
    function startGame() {
      currentState = {
        currentScenarioIndex: 0,
        score: 0,
        gameStarted: true
      };
      
      showScreen('game');
      loadScenario();
      updateHUD();
    }

    // 切換畫面
    function showScreen(screenId) {
      Object.keys(screens).forEach(key => {
        screens[key].classList.remove('active');
      });
      screens[screenId].classList.add('active');
    }

    // 載入場景
    function loadScenario() {
      const scenario = scenarios[currentState.currentScenarioIndex];
      elements.scenarioTitle.innerText = scenario.title;
      elements.scenarioDesc.innerText = scenario.desc;
      
      elements.scenarioImage.innerHTML = `<img src="${scenario.image}" alt="${scenario.title}" style="max-height: 100%; max-width: 100%; object-fit: contain;">`;
      
      updateHUD();
    }

    // 更新 HUD
    function updateHUD() {
      elements.scoreDisplay.innerText = `阿嬤給的小貼紙: ${currentState.score}`;
      const progress = (currentState.currentScenarioIndex / scenarios.length) * 100;
      elements.progressFill.style.width = `${progress}%`;
    }

    // 處理選擇
    function handleChoice(userChoice) {
      const scenario = scenarios[currentState.currentScenarioIndex];
      const isCorrect = userChoice === scenario.isSafe;
      
      if (isCorrect) {
        currentState.score += 1;
        showFeedback(true, scenario.feedback.correct);
      } else {
        showFeedback(false, scenario.feedback.wrong);
      }
    }

    // 顯示反饋
    function showFeedback(isCorrect, message) {
      elements.feedbackIcon.innerText = isCorrect ? '🌟' : '💡';
      elements.feedbackMessage.innerText = message;
      elements.feedbackOverlay.classList.remove('hidden');
      elements.feedbackOverlay.classList.add('active');
    }

    // 下一個場景
    function nextScenario() {
      elements.feedbackOverlay.classList.remove('active');
      elements.feedbackOverlay.classList.add('hidden');
      
      currentState.currentScenarioIndex++;
      
      if (currentState.currentScenarioIndex < scenarios.length) {
        loadScenario();
      } else {
        endGame();
      }
    }

    // 結束遊戲
    function endGame() {
      showScreen('result');
      elements.finalScore.innerText = `${currentState.score} / ${scenarios.length}`;
      
      if (currentState.score === scenarios.length) {
        elements.wisdomText.innerText = "太棒了！你已經完全掌握了阿嬤的廚房智慧，是個合格的食安小偵探！";
      } else {
        elements.wisdomText.innerText = "沒關係，多看幾次就會記住了。阿嬤常說：『病從口入』，多一分留心，少一分擔心。";
      }
    }

    // 啟動
    window.onload = init;
  </script>
</body>
</html>
